name: Nemotron-CC 1.0
catalogue: nemotron-cc/1.0/data
suffix: .jsonl.zst
text: text
id: warc_record_id
#
release:
  default:
    input: sample
    annotations: [nemo-curator, openai-privacy-filter]
    mask: [account_number, private_email, private_phone, private_url, secret]
    pack: tree
    sample: full
#
# ./etc/plan.py --pattern nemotron-cc-1.0 --format yaml \
#   --budget datamix.txt | grep -v sample:
#
  high/actual:
    shard: 130md
  medium-high/actual:
    shard: 108md
  medium/actual:
    sample: random
    budget: 89%
    shard: 111md
#
sample:
  default:
    input: source
  high/actual:
    annotations: [propella-4b]
    sample: dynamic
    filter: ../sample/propella-filter.py
    parameters: {}
#
nemo-curator:
  default:
    input: source
#
openai-privacy-filter:
  default:
    input: source
#
propella-4b:
  high/actual:
#
source:
  default:
    suffix: .jsonl.zstd
  high/actual:
  medium/actual:
  medium-high/actual:
