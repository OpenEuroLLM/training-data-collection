name:
suffix: .jsonl.zst
hash:
  type: sha256
  key: hash
#
release:
  default:
    input: parallel
    annotations: [nemo-curator, openai-privacy-filter]
    pack: tree
    parallel:
      count: 40
      flip: 0.5
