name: Training Data Collection for OpenEuroLLM Baby Model
date: May 2026
tokenizer: openeurollm/tokenizer-256k
release:
  filter: contamination # suppress documents flagged for benchmark contamination
  mask: pii # mask out sub-strings flagged as personally identifiable information
sources:
  default:
    pack: tree # outputs go into .release. subdirectories parallel to .source.
  dclm-1.0:
    pack: flat # remove internal structure, outputs go into .release. top level
    parts: 100
  finepdfs-1.0.0:
    parts: 37
  finepdfs-edu-1.0.0:
    parts: 36
  hplt-3.0:
    parts: 36
  nemotron-cc-1.0:
    parts: 3
